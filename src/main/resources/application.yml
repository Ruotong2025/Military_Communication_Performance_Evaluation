# ============================================================
# 军事通信效能评估系统 - Spring Boot 主配置
#
# 默认激活开发环境 (dev)
# 开发环境数据库：root / root
# 生产环境启动时添加参数：--spring.profiles.active=prod
#
# Python 脚本路径配置说明：
#   Windows: C:\\path\\to\\military_operational_effectiveness_evaluation\\generate\\generate_all_data.py
#   Linux: /opt/military-evaluation/military_operational_effectiveness_evaluation/generate/generate_all_data.py
# ============================================================

spring:
  application:
    name: military-communication-evaluation

  # 激活的配置文件
  # 开发环境：默认使用主配置（无需指定）
  # 生产环境：--spring.profiles.active=prod
  profiles:
    active: dev

  # 数据源配置 - 开发环境默认配置
  datasource:
    url: jdbc:mysql://localhost:3306/military_operational_effectiveness_evaluation?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # JPA配置
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 日志配置 - 开发环境（详细日志）
logging:
  level:
    root: INFO
    com.ccnu.military: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger/OpenAPI配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.ccnu.military.controller

# Python 服务配置
python:
  executable: python
  script:
    path: python_service/evaluation_service.py
  dynamic-parser-script: python_service/dynamic_parser.py
  timeout: 300
  combat-data-script: military_operational_effectiveness_evaluation/generate/generate_all_data.py
  combat-timeout: 600
