server {
    listen       80;
    server_name  _;

    # 前端静态文件目录（与 Dockerfile 的 COPY 路径保持一致）
    root  /usr/share/nginx/html;
    index index.html;

    # ========================================================
    # 前端 SPA 路由：Vue/Vite 默认使用 history 模式，
    # 所有非 /api/* 的请求都返回 index.html，由前端路由接管
    # ========================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================
    # API 反向代理：把前端发来的 /api/* 请求转发到 Spring Boot
    # （前端 axios baseURL 配置为 /api，参考 frontend/src/api/index.js）
    # ========================================================
    location /api/ {
        # ★★★ 请根据实际网络情况修改以下 IP:端口 ★★★
        # Spring Boot 后端容器名 + 端口（容器内互通）
        proxy_pass http://backend:8080/api/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（根据 application.yml 的 timeout 参数适当调大）
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ========================================================
    # Swagger UI（Spring Boot 通过 springdoc 提供）
    # ========================================================
    location /api/swagger-ui/ {
        proxy_pass http://backend:8080/api/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /api/v3/api-docs {
        proxy_pass http://backend:8080/api/v3/api-docs;
        proxy_set_header Host $host;
    }

    # ========================================================
    # 静态资源缓存（避免 JS/CSS/图片频繁请求后端）
    # ========================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================
    # 安全响应头（可选）
    # ========================================================
    add_header X-Frame-Options        "SAMEORIGIN"      always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
}
