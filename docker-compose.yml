version: '3.9'

# ============================================================
# 军事通信效能评估系统 - Docker Compose 部署配置
#
# 包含两个服务：
#   1. backend     — Spring Boot 后端 API（Java 8）
#   2. frontend    — Vue 前端静态文件 + Nginx 反代
#
# MySQL：使用本地已安装的 MySQL 5.7
#
# 启动方式（任选其一）：
#   方式 A（前台日志）：docker-compose up
#   方式 B（后台运行）：docker-compose up -d
#   查看日志：         docker-compose logs -f [服务名]
#   停止：             docker-compose down
# ============================================================

services:

  # --------------------------------------------------------
  # ① Spring Boot 后端服务
  # --------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.springboot
    container_name: military-backend
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 连接本地 MySQL（Windows下使用host.docker.internal，Linux下使用宿主机IP）
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/military_operational_effectiveness_evaluation?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      # Java 运行时参数（可按服务器配置调整）
      JAVA_OPTS: "-Xms512m -Xmx1024m -Dspring.profiles.active=prod"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "8080:8080"          # 仅开发调试需要暴露；生产环境由 Nginx 反代，可删除此行

    networks:
      - military-net

  # --------------------------------------------------------
  # ② Vue 前端 + Nginx（同时反代 /api 到后端）
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: military-frontend
    restart: unless-stopped

    ports:
      - "80:80"              # 浏览器直接访问 http://服务器IP 即可

    depends_on:
      - backend              # 前端不强制等后端（后端启动较慢，前端先运行即可）

    networks:
      - military-net

# ============================================================
# 网络：所有容器在同一个 bridge 网络内互通
# ============================================================
networks:
  military-net:
    driver: bridge
